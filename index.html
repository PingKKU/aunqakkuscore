<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUN-QA Executive Dashboard</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: #f8fafc; }
        .chart-container { position: relative; height: 400px; width: 100%; }
        .heatmap-cell { transition: all 0.2s; }
        .heatmap-cell:hover { transform: scale(1.05); cursor: default; }
        /* AUN-QA Scoring Colors */
        .score-red { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .score-yellow { background-color: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
        .score-green { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .score-empty { background-color: #f1f5f9; color: #94a3b8; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header Section -->
    <header class="bg-indigo-900 text-white shadow-lg p-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">AUN-QA Assessment Dashboard</h1>
                <p class="text-indigo-200 text-sm">Educational Quality Assurance Tracking System</p>
            </div>
            <div id="sync-status" class="bg-indigo-800 px-4 py-2 rounded-full text-xs font-mono">
                Status: Connecting to Live Data...
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-8">
        
        <!-- Filter Controls -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-slate-600">คณะ (Faculty)</label>
                <select id="faculty-select" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="">-- กำลังโหลดข้อมูล --</option>
                </select>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-slate-600">หลักสูตร (Program)</label>
                <select id="program-select" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="">-- เลือกคณะก่อน --</option>
                </select>
            </div>
        </section>

        <!-- Charts Section -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Radar Chart -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h3 class="text-lg font-bold mb-4 text-slate-700">AUN-QA Criteria Profile (C1 - C8)</h3>
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
            <!-- Bar Chart -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h3 class="text-lg font-bold mb-4 text-slate-700">Program Comparison (Faculty Overview)</h3>
                <div class="chart-container">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </section>

        <!-- Heatmap Table -->
        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold text-slate-700">Detailed Sub-criteria Assessment (C1.1 - C8.5)</h3>
                <div class="flex gap-4 text-xs">
                    <span class="flex items-center gap-1"><span class="w-3 h-3 score-red rounded"></span> 1-2</span>
                    <span class="flex items-center gap-1"><span class="w-3 h-3 score-yellow rounded"></span> 3</span>
                    <span class="flex items-center gap-1"><span class="w-3 h-3 score-green rounded"></span> 4+</span>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full border-collapse text-xs text-center" id="heatmap-table">
                    <thead>
                        <tr id="table-header" class="bg-slate-100 text-slate-600 uppercase tracking-wider">
                            <!-- Headers dynamically injected -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data rows dynamically injected -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1UaRHmu-gK0qcn7tfsJENuFCIzJ9YCgpVWSWHLGGSNQ4/export?format=csv&gid=1573666531';
        
        let rawData = [];
        let radarChartInstance = null;
        let barChartInstance = null;

        // Data processing helper
        const getScoreClass = (val) => {
            const num = parseFloat(val);
            if (isNaN(num) || val === '') return 'score-empty';
            if (num <= 2) return 'score-red';
            if (num === 3) return 'score-yellow';
            return 'score-green';
        };

        async function initDashboard() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    dynamicTyping: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        rawData = results.data;
                        document.getElementById('sync-status').innerText = 'Data Live: ' + new Date().toLocaleTimeString();
                        setupFilters();
                    }
                });
            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('sync-status').innerText = 'Error loading data';
            }
        }

        function setupFilters() {
            const facultySelect = document.getElementById('faculty-select');
            const programSelect = document.getElementById('program-select');
            
            // Get unique faculties
            const faculties = [...new Set(rawData.map(item => item['คณะ']))].filter(Boolean);
            
            facultySelect.innerHTML = '<option value="">-- กรุณาเลือกคณะ --</option>';
            faculties.forEach(fac => {
                const opt = document.createElement('option');
                opt.value = fac;
                opt.innerText = fac;
                facultySelect.appendChild(opt);
            });

            facultySelect.addEventListener('change', (e) => {
                const selectedFac = e.target.value;
                const filteredPrograms = rawData.filter(item => item['คณะ'] === selectedFac);
                
                programSelect.innerHTML = '<option value="">-- กรุณาเลือกหลักสูตร --</option>';
                filteredPrograms.forEach(prog => {
                    const opt = document.createElement('option');
                    opt.value = prog['หลักสูตร'];
                    opt.innerText = prog['หลักสูตร'];
                    programSelect.appendChild(opt);
                });

                updateBarChart(selectedFac);
            });

            programSelect.addEventListener('change', (e) => {
                const selectedProg = e.target.value;
                const programData = rawData.find(item => item['หลักสูตร'] === selectedProg);
                if (programData) {
                    updateRadarChart(programData);
                    updateHeatmap(programData);
                }
            });
        }

        function updateRadarChart(data) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const labels = ['C1 รวม', 'C2 รวม', 'C3 รวม', 'C4 รวม', 'C5 รวม', 'C6 รวม', 'C7 รวม', 'C8 รวม'];
            const scores = labels.map(label => data[label] || 0);

            if (radarChartInstance) radarChartInstance.destroy();

            radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: data['หลักสูตร'],
                        data: scores,
                        backgroundColor: 'rgba(79, 70, 229, 0.2)',
                        borderColor: 'rgb(79, 70, 229)',
                        pointBackgroundColor: 'rgb(79, 70, 229)',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { r: { beginAtZero: true, max: 7, ticks: { stepSize: 1 } } }
                }
            });
        }

        function updateBarChart(faculty) {
            const ctx = document.getElementById('barChart').getContext('2d');
            const facultyData = rawData.filter(item => item['คณะ'] === faculty);
            
            const labels = facultyData.map(item => item['หลักสูตร']);
            // Calculate an average of C1-C8 for comparison
            const criteria = ['C1 รวม', 'C2 รวม', 'C3 รวม', 'C4 รวม', 'C5 รวม', 'C6 รวม', 'C7 รวม', 'C8 รวม'];
            const averages = facultyData.map(item => {
                let sum = 0;
                criteria.forEach(c => sum += (item[c] || 0));
                return (sum / criteria.length).toFixed(2);
            });

            if (barChartInstance) barChartInstance.destroy();

            barChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Average Score (Overall Criteria)',
                        data: averages,
                        backgroundColor: 'rgba(99, 102, 241, 0.8)',
                        borderRadius: 6
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { beginAtZero: true, max: 7 } }
                }
            });
        }

        function updateHeatmap(data) {
            const headerRow = document.getElementById('table-header');
            const bodyRow = document.getElementById('table-body');
            
            // Find all columns that match sub-criteria pattern (C1.1, C1.2, etc.)
            const subCriteriaCols = Object.keys(data).filter(key => /^C[1-8]\.\d+$/.test(key));
            
            headerRow.innerHTML = '<th class="p-3 border border-slate-200">Criterion</th>';
            subCriteriaCols.forEach(col => {
                headerRow.innerHTML += `<th class="p-3 border border-slate-200">${col}</th>`;
            });

            let rowHtml = `<tr class="bg-white">
                <td class="p-3 border border-slate-200 font-bold bg-slate-50 text-left">Score</td>`;
            
            subCriteriaCols.forEach(col => {
                const val = data[col];
                const cssClass = getScoreClass(val);
                rowHtml += `<td class="p-3 border border-slate-200 heatmap-cell ${cssClass} font-bold text-lg">${val || '-'}</td>`;
            });
            rowHtml += '</tr>';
            
            bodyRow.innerHTML = rowHtml;
        }

        // Run app
        initDashboard();
    </script>
</body>
</html>
